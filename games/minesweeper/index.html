<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minesweeper - Retro Replay</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="../../index.html" class="home-link btn">&larr; HOME</a>

  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">MINESWEEPER</h1>
    </div>

    <div class="difficulty-select">
      <button class="btn btn-green active" data-diff="easy">EASY</button>
      <button class="btn" data-diff="medium">MEDIUM</button>
      <button class="btn btn-magenta" data-diff="hard">HARD</button>
    </div>

    <div class="mine-info">
      <div class="panel-box">
        <h3>MINES</h3>
        <div class="value" id="mineCount">10</div>
      </div>
      <div class="panel-box">
        <h3>TIME</h3>
        <div class="value" id="timer">000</div>
      </div>
      <div class="panel-box">
        <h3>BEST</h3>
        <div class="value" id="bestTime">---</div>
      </div>
    </div>

    <div class="mine-status" id="status"></div>

    <div class="mine-grid" id="grid"></div>

    <div class="game-controls" style="margin-top: 1rem;">
      <button class="btn btn-green" id="newGameBtn">NEW GAME</button>
    </div>

    <div class="touch-controls" id="touchControls">
      <button class="touch-btn touch-btn-wide touch-flag-toggle" id="touchFlagToggle">
        &#128681; FLAG MODE: OFF
      </button>
    </div>

    <div class="controls-help">
      <kbd>Left Click</kbd> Open Cell &nbsp;
      <kbd>Right Click</kbd> Flag/Unflag
    </div>
    <a href="https://aicraftlog.com" target="_blank" rel="noopener noreferrer" class="ad-banner">
      <span class="ad-banner-icon">&#10024;</span>
      <div class="ad-banner-text">
        <div class="ad-banner-title">AI Craft Log</div>
        <div class="ad-banner-desc">AI로 만든 더 재미있는 결과물들을 구경하세요!</div>
      </div>
      <span class="ad-banner-arrow">&#10132;</span>
    </a>
  </div>

  <script src="minesweeper.js"></script>
</body>
</html>
