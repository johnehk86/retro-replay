<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tetris - Retro Replay</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="../../index.html" class="home-link btn">&larr; HOME</a>

  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">TETRIS</h1>
    </div>

    <div class="tetris-layout">
      <div class="side-panel">
        <div class="panel-box">
          <h3>SCORE</h3>
          <div class="value" id="score">0</div>
        </div>
        <div class="panel-box">
          <h3>LEVEL</h3>
          <div class="value" id="level">1</div>
        </div>
        <div class="panel-box">
          <h3>LINES</h3>
          <div class="value" id="lines">0</div>
        </div>
        <div class="panel-box">
          <h3>HIGH SCORE</h3>
          <div class="value" id="highScore">0</div>
        </div>
      </div>

      <div class="game-canvas-wrapper" style="position: relative;">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        <div class="overlay hidden" id="overlay">
          <div class="overlay-title" id="overlayTitle">GAME OVER</div>
          <div class="overlay-score" id="overlayScore"></div>
          <div class="overlay-text">PRESS ENTER TO RESTART</div>
        </div>
      </div>

      <div class="side-panel">
        <div class="panel-box">
          <h3>NEXT</h3>
          <div class="next-preview">
            <canvas id="nextCanvas" width="120" height="120"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="game-controls">
      <button class="btn btn-green" id="startBtn">START</button>
      <button class="btn" id="pauseBtn">PAUSE</button>
    </div>

    <div class="touch-controls" id="touchControls">
      <div class="touch-row">
        <button class="touch-btn" id="touchLeft" aria-label="Left">&#9664;</button>
        <button class="touch-btn touch-btn-yellow" id="touchDown" aria-label="Soft Drop">&#9660;</button>
        <button class="touch-btn" id="touchRight" aria-label="Right">&#9654;</button>
      </div>
      <div class="touch-row" style="margin-left: 1.5rem;">
        <button class="touch-btn touch-btn-green" id="touchRotate" aria-label="Rotate">&#8635;</button>
        <button class="touch-btn touch-btn-magenta" id="touchDrop" aria-label="Hard Drop">&#11015;</button>
      </div>
    </div>

    <div class="controls-help">
      <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;
      <kbd>&uarr;</kbd> Rotate &nbsp;
      <kbd>&darr;</kbd> Soft Drop &nbsp;
      <kbd>Space</kbd> Hard Drop &nbsp;
      <kbd>P</kbd> Pause
    </div>
    <a href="https://aicraftlog.com" target="_blank" rel="noopener noreferrer" class="ad-banner">
      <span class="ad-banner-icon">&#10024;</span>
      <div class="ad-banner-text">
        <div class="ad-banner-title">AI Craft Log</div>
        <div class="ad-banner-desc">AI로 만든 더 재미있는 결과물들을 구경하세요!</div>
      </div>
      <span class="ad-banner-arrow">&#10132;</span>
    </a>
  </div>

  <script src="tetris.js"></script>
</body>
</html>
