<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dodge - Retro Replay</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="../../index.html" class="home-link btn">&larr; HOME</a>

  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">DODGE</h1>
    </div>

    <div class="dodge-info">
      <div class="panel-box">
        <h3>TIME</h3>
        <div class="value" id="timer">0.0s</div>
      </div>
      <div class="panel-box">
        <h3>MISSILES</h3>
        <div class="value" id="missileCount">0</div>
      </div>
      <div class="panel-box">
        <h3>BEST</h3>
        <div class="value" id="highScore">0.0s</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="game-canvas-wrapper" style="position: relative;">
      <canvas id="gameCanvas" width="480" height="480"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">DODGE</div>
        <div class="overlay-score" id="overlayScore">미사일을 피해 생존하세요!</div>
        <div class="overlay-text" id="overlayText">PRESS ENTER OR CLICK START</div>
      </div>
    </div>

    <div class="game-controls">
      <button class="btn btn-green" id="startBtn">START</button>
      <button class="btn" id="pauseBtn">PAUSE</button>
    </div>

    <div class="touch-controls" id="touchControls">
      <div class="touch-hint">화면을 터치하면 비행기가 따라갑니다</div>
    </div>

    <div class="controls-help">
      <kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> or <kbd>Mouse</kbd> Move &nbsp;
      <kbd>P</kbd> Pause &nbsp;|&nbsp; 60초 생존 도전!
    </div>
    <a href="https://aicraftlog.com" target="_blank" rel="noopener noreferrer" class="ad-banner">
      <span class="ad-banner-icon">&#10024;</span>
      <div class="ad-banner-text">
        <div class="ad-banner-title">AI Craft Log</div>
        <div class="ad-banner-desc">AI로 만든 더 재미있는 결과물들을 구경하세요!</div>
      </div>
      <span class="ad-banner-arrow">&#10132;</span>
    </a>
  </div>

  <script src="dodge.js"></script>
</body>
</html>
